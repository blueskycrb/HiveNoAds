name: Build ad-block dylibs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build all apps/*/ dylibs
        run: |
          set -euo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p dist
          shopt -s nullglob
          srcs=(apps/*/*.m)
          if [ ${#srcs[@]} -eq 0 ]; then
            echo "No sources under apps/*/*.m" >&2
            exit 1
          fi
          for src in "${srcs[@]}"; do
            app=$(basename "$(dirname "$src")")
            # dylib named by product (injection target): apps/Fengchao/Fengchao.m -> Fengchao.dylib
            out="dist/${app}.dylib"
            min_ios="13.0"
            if [ "$app" = "LoLMobile" ]; then
              min_ios="11.0"
            fi
            if [ "$app" = "Xiaohongshu" ]; then
              min_ios="14.0"
            fi
            echo "==> building $out from $src"
            # Xiaohongshu v10.2 needs Photos + AVFoundation for video re-export album save
            EXTRA_FW=""
            if [ "$app" = "Xiaohongshu" ]; then
              # v10.2 fallback save: Photos write + AVFoundation re-export + CoreGraphics
              EXTRA_FW="-framework Photos -framework AVFoundation -framework CoreGraphics"
            fi
            # shellcheck disable=SC2086
            clang -dynamiclib \
              -isysroot "$SDK" \
              -arch arm64 \
              -miphoneos-version-min="$min_ios" \
              -fobjc-arc \
              -fblocks \
              -O2 \
              -fvisibility=hidden \
              -framework Foundation \
              -framework UIKit \
              $EXTRA_FW \
              -install_name "@rpath/${app}.dylib" \
              -o "$out" \
              "$src"
            codesign -f -s - "$out" 2>/dev/null || true
            file "$out"
            ls -lh "$out"
          done
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noads-dylibs
          path: dist/*.dylib
          if-no-files-found: error

      - name: Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="build-${{ github.run_number }}"
          TITLE="NoAds dylibs #${{ github.run_number }}"
          # softprops/action-gh-release breaks on non-ASCII asset names.
          # Product-name dylibs (ASCII) for GitHub Releases compatibility.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists"
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md --draft=false
          else
            gh release create "$TAG" --title "$TITLE" --notes-file release-notes.md
          fi
          shopt -s nullglob
          files=(dist/*.dylib)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No dylibs in dist/" >&2
            exit 1
          fi
          ls -lh dist/
          for f in "${files[@]}"; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
          done
          gh release view "$TAG"
