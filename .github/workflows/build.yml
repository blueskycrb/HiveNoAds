name: Build ad-block dylibs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build all apps/*/ dylibs
        run: |
          set -euo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p dist
          shopt -s nullglob
          srcs=(apps/*/*.m)
          if [ ${#srcs[@]} -eq 0 ]; then
            echo "No sources under apps/*/*.m" >&2
            exit 1
          fi
          for src in "${srcs[@]}"; do
            app=$(basename "$(dirname "$src")")
            # dylib 与 App 同名: apps/HiveConsumer/HiveConsumer.m → HiveConsumer.dylib
            out="dist/${app}.dylib"
            min_ios="13.0"
            if [ "$app" = "QTL" ]; then
              min_ios="11.0"
            fi
            echo "==> building $out from $src"
            clang -dynamiclib \
              -isysroot "$SDK" \
              -arch arm64 \
              -miphoneos-version-min="$min_ios" \
              -fobjc-arc \
              -fblocks \
              -O2 \
              -fvisibility=hidden \
              -framework Foundation \
              -framework UIKit \
              -install_name "@rpath/${app}.dylib" \
              -o "$out" \
              "$src"
            file "$out"
            ls -lh "$out"
          done
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noads-dylibs
          path: dist/*.dylib
          if-no-files-found: error

      - name: Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: NoAds dylibs #${{ github.run_number }}
          body: |
            按 **App 名** 命名的去广告 dylib（TrollFools，无 Substrate）。

            | 文件 | 注入目标 |
            |------|----------|
            | `HiveConsumer.dylib` | 丰巢 (`com.fcbox.hiveconsumer`) |
            | `Cainiao4iPhone.dylib` | 菜鸟 (`com.cainiao.cnwireless`) |
            | `QTL.dylib` | 掌上英雄联盟 (`com.tencent.ied.app.lolbible`) |
            | `Volunteer.dylib` | 志愿汇 (`Volunteer` 5.8.4) |

            ## 用法
            1. 下载对应 `AppName.dylib`
            2. TrollFools → 选择 App → 注入
            3. 彻底杀掉 App 后冷启动

            ## v2 性能
            - 取消全进程类扫描
            - 取消 UIView 全局 swizzle
            - 默认关闭日志
          files: dist/*.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
