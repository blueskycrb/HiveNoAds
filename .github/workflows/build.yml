name: Build ad-block dylibs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build all apps/*/ dylibs
        run: |
          set -euo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p dist
          shopt -s nullglob
          srcs=(apps/*/*.m)
          if [ ${#srcs[@]} -eq 0 ]; then
            echo "No sources under apps/*/*.m" >&2
            exit 1
          fi
          for src in "${srcs[@]}"; do
            app=$(basename "$(dirname "$src")")
            # dylib 涓?App 鍚屽悕: apps/HiveConsumer/HiveConsumer.m 鈫?HiveConsumer.dylib
            out="dist/${app}.dylib"
            min_ios="13.0"
            if [ "$app" = "QTL" ]; then
              min_ios="11.0"
            fi
            if [ "$app" = "discover" ]; then
              min_ios="14.0"
            fi
            echo "==> building $out from $src"
            # discover v10.2 needs Photos + AVFoundation for video re-export album save
            EXTRA_FW=""
            if [ "$app" = "discover" ]; then
              # v10.2 fallback save: Photos write + AVFoundation re-export + CoreGraphics
              EXTRA_FW="-framework Photos -framework AVFoundation -framework CoreGraphics"
            fi
            # shellcheck disable=SC2086
            clang -dynamiclib \
              -isysroot "$SDK" \
              -arch arm64 \
              -miphoneos-version-min="$min_ios" \
              -fobjc-arc \
              -fblocks \
              -O2 \
              -fvisibility=hidden \
              -framework Foundation \
              -framework UIKit \
              $EXTRA_FW \
              -install_name "@rpath/${app}.dylib" \
              -o "$out" \
              "$src"
            codesign -f -s - "$out" 2>/dev/null || true
            file "$out"
            ls -lh "$out"
          done
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noads-dylibs
          path: dist/*.dylib
          if-no-files-found: error

      - name: Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: NoAds dylibs #${{ github.run_number }}
          body: |
            鎸?**App 鍚?* 鍛藉悕鐨?dylib锛圱rollFools锛屾棤 Substrate锛夈€?

            | 鏂囦欢 | 娉ㄥ叆鐩爣 | 鍔熻兘 |
            |------|----------|------|
            | `HiveConsumer.dylib` | 铚滅綈 (`com.fcbox.hiveconsumer`) | 鍘诲箍鍛?|
            | `Cainiao4iPhone.dylib` | 鑿滈笩 (`com.cainiao.cnwireless`) | 鍘诲箍鍛?|
            | `QTL.dylib` | 鎺屼笂鑻遍泟鑱旂洘 (`com.tencent.ied.app.lolbible`) | 鍘诲箍鍛?|
            | `Volunteer.dylib` | 鎰胯€呮眹 (`Volunteer` 5.8.4) | 鍘诲箍鍛?|
            | `mCloud_iPhone.dylib` | 涓浗绉诲姩浜戠洏 (`com.chinamobile.mcloud` / 13.0.0) | 鍘诲箍鍛?|
            | `ChinaRadio.dylib` | 涓浗骞跨數 (`com.cbn.app` / ChinaRadio 2.0.8) | 鍘诲箍鍛?|
