name: Build ad-block dylibs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build all apps/*/ dylibs
        run: |
          set -euo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p dist
          shopt -s nullglob
          srcs=(apps/*/*.m)
          if [ ${#srcs[@]} -eq 0 ]; then
            echo "No sources under apps/*/*.m" >&2
            exit 1
          fi
          for src in "${srcs[@]}"; do
            app=$(basename "$(dirname "$src")")
            # dylib 与 App 同名: apps/HiveConsumer/HiveConsumer.m → HiveConsumer.dylib
            out="dist/${app}.dylib"
            min_ios="13.0"
            if [ "$app" = "QTL" ]; then
              min_ios="11.0"
            fi
            if [ "$app" = "discover" ]; then
              min_ios="14.0"
            fi
            echo "==> building $out from $src"
            # discover 仅 runtime swizzle，Foundation+UIKit 足够
            EXTRA_FW=""
            # shellcheck disable=SC2086
            clang -dynamiclib \
              -isysroot "$SDK" \
              -arch arm64 \
              -miphoneos-version-min="$min_ios" \
              -fobjc-arc \
              -fblocks \
              -O2 \
              -fvisibility=hidden \
              -framework Foundation \
              -framework UIKit \
              $EXTRA_FW \
              -install_name "@rpath/${app}.dylib" \
              -o "$out" \
              "$src"
            codesign -f -s - "$out" 2>/dev/null || true
            file "$out"
            ls -lh "$out"
          done
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: noads-dylibs
          path: dist/*.dylib
          if-no-files-found: error

      - name: Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: NoAds dylibs #${{ github.run_number }}
          body: |
            按 **App 名** 命名的 dylib（TrollFools，无 Substrate）。

            | 文件 | 注入目标 | 功能 |
            |------|----------|------|
            | `HiveConsumer.dylib` | 丰巢 (`com.fcbox.hiveconsumer`) | 去广告 |
            | `Cainiao4iPhone.dylib` | 菜鸟 (`com.cainiao.cnwireless`) | 去广告 |
            | `QTL.dylib` | 掌上英雄联盟 (`com.tencent.ied.app.lolbible`) | 去广告 |
            | `Volunteer.dylib` | 志愿汇 (`Volunteer` 5.8.4) | 去广告 |
            | `mCloud_iPhone.dylib` | 中国移动云盘 (`com.chinamobile.mcloud` / 13.0.0) | 去广告 |
            | `ChinaRadio.dylib` | 中国广电 (`com.cbn.app` / ChinaRadio 2.0.8) | 去广告 |
            | **`discover.dylib`** | **小红书** (`com.xingin.discover` / `discover` 9.38.1) | **解锁保存别人帖子图片/视频** |

            ## 用法
            1. 下载对应 `AppName.dylib`
            2. TrollFools → 选择 App → 注入
            3. 彻底杀掉 App 后冷启动

            ## 小红书 `discover.dylib`（无悬浮按钮、不截图）
            - 强制 `disableSave=NO` + 作者隐私下载开关：
              `hitUserNoteDownloadSwitch` / `userNoteDownloadSwitch` / `isFlowDownloadSwitchOn`
            - 屏蔽 `checkShowCloseNoteDownloadSwitchToast` 及「作者关闭下载」类 toast
            - 图文/视频走 App 原生「保存图片/保存视频」
            - 设置 → 小红书 → 照片 → 允许添加
            - 不破解付费墙；服务端硬拦时入口仍可能不出现

            ## v2 性能（去广告类）
            - 取消全进程类扫描（各 App 按自身实现）
            - 取消 UIView 全局 swizzle
            - 默认关闭日志
          files: dist/*.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
